name: Daily AI Investment Analysis

on:
  workflow_dispatch:
    inputs:
      symbol:
        description: "Stock symbol"
        required: false
        default: "2603.TW"
      symbols:
        description: "Comma-separated symbols. Overrides symbol when provided."
        required: false
        default: ""
      mode:
        description: "general or personalized"
        required: false
        default: "personalized"
      model:
        description: "OpenAI model override"
        required: false
        default: ""
      send_email:
        description: "Send email report"
        required: false
        default: "true"
  schedule:
    # Taiwan time = UTC+8. This runs every day at 08:10 and 20:10 Asia/Taipei.
    - cron: "10 0 * * *"
    - cron: "10 12 * * *"

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Chromium for Playwright
        run: python -m playwright install --with-deps chromium

      - name: Run scheduled analysis
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}
          OPENAI_TIMEOUT_SECONDS: "360"
          OPENAI_MAX_OUTPUT_TOKENS: "6000"
          FINMIND_TOKEN: ${{ secrets.FINMIND_TOKEN }}
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
          SERPAPI_API_KEY: ${{ secrets.SERPAPI_API_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          BRAVE_SEARCH_API_KEY: ${{ secrets.BRAVE_SEARCH_API_KEY }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SMTP_STARTTLS: ${{ secrets.SMTP_STARTTLS }}
          REPORT_EMAIL_FROM: ${{ secrets.REPORT_EMAIL_FROM }}
          REPORT_EMAIL_TO: ${{ secrets.REPORT_EMAIL_TO }}
          UPDATE_GOOGLE_SHEET: ${{ secrets.UPDATE_GOOGLE_SHEET || 'true' }}
          GOOGLE_SHEET_REQUIRED: ${{ secrets.GOOGLE_SHEET_REQUIRED || 'false' }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_SHEET_WORKSHEET: ${{ secrets.GOOGLE_SHEET_WORKSHEET || 'analysis_log' }}
          UPDATE_SUPABASE: ${{ secrets.UPDATE_SUPABASE || 'true' }}
          SUPABASE_REQUIRED: ${{ secrets.SUPABASE_REQUIRED || 'false' }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          VALIDATE_PREDICTIONS: ${{ secrets.VALIDATE_PREDICTIONS || 'true' }}
          RUN_REPORT_AUDIT: ${{ secrets.RUN_REPORT_AUDIT || 'true' }}
          REPORT_SYMBOL: ${{ github.event.inputs.symbol || '2603.TW' }}
          REPORT_SYMBOLS: ${{ github.event.inputs.symbols || secrets.REPORT_SYMBOLS }}
          REPORT_MODE: ${{ github.event.inputs.mode || 'personalized' }}
          REPORT_MODEL: ${{ github.event.inputs.model || secrets.OPENAI_MODEL }}
          SEND_EMAIL: ${{ github.event.inputs.send_email || 'true' }}
        run: python -m backend.jobs.daily_analysis_email

      - name: Upload report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scheduled-analysis-report
          path: data/scheduled_reports/
          if-no-files-found: warn
