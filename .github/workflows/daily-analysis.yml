name: Daily AI Investment Analysis

on:
  workflow_dispatch:
    inputs:
      symbol:
        description: "Stock symbol"
        required: false
        default: "2603.TW"
      mode:
        description: "general or personalized"
        required: false
        default: "personalized"
      model:
        description: "OpenAI model override"
        required: false
        default: ""
      send_email:
        description: "Send email report"
        required: false
        default: "true"
  schedule:
    # Taiwan time = UTC+8. This runs at 16:40 Asia/Taipei on weekdays.
    - cron: "40 8 * * 1-5"

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Chromium for Playwright
        run: python -m playwright install --with-deps chromium

      - name: Run scheduled analysis
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}
          OPENAI_TIMEOUT_SECONDS: "360"
          OPENAI_MAX_OUTPUT_TOKENS: "6000"
          FINMIND_TOKEN: ${{ secrets.FINMIND_TOKEN }}
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
          SERPAPI_API_KEY: ${{ secrets.SERPAPI_API_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          BRAVE_SEARCH_API_KEY: ${{ secrets.BRAVE_SEARCH_API_KEY }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SMTP_STARTTLS: ${{ secrets.SMTP_STARTTLS }}
          REPORT_EMAIL_FROM: ${{ secrets.REPORT_EMAIL_FROM }}
          REPORT_EMAIL_TO: ${{ secrets.REPORT_EMAIL_TO }}
          REPORT_SYMBOL: ${{ github.event.inputs.symbol || '2603.TW' }}
          REPORT_MODE: ${{ github.event.inputs.mode || 'personalized' }}
          REPORT_MODEL: ${{ github.event.inputs.model || secrets.OPENAI_MODEL }}
          SEND_EMAIL: ${{ github.event.inputs.send_email || 'true' }}
        run: python -m backend.jobs.daily_analysis_email

      - name: Upload report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scheduled-analysis-report
          path: data/scheduled_reports/
          if-no-files-found: warn
