    core_lots: 20
    flexible_lots: 10

strategy:
  target_sell_zones:
    - price_range: [245, 250]
      action: "consider_sell"
      suggested_lots: [2, 3]
    - price_range: [255, 260]
      action: "consider_sell"
      suggested_lots: [3, 5]
