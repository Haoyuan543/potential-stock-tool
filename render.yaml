services:
  - type: web
    name: potential-stock-tool
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: STORAGE_BACKEND
        value: supabase
      - key: SUPABASE_RECORDS_TABLE
        value: potential_stock_records
      - key: DASHBOARD_USERNAME
        value: admin
      - key: DASHBOARD_PASSWORD
        sync: false
      - key: CRON_JOB_SECRET
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: FINMIND_TOKEN
        sync: false
      - key: NEWS_API_KEY
        sync: false
